name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Generate a small dataset (smoke test)
        run: python generate.py --scale 0.1 --format csv --out ci_smoke

      - name: Check output exists and has rows
        run: |
          test -f ci_smoke.csv
          rows=$(($(wc -l < ci_smoke.csv) - 1))
          echo "generated $rows rows"
          test "$rows" -gt 0
